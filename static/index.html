<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Simulado Detran RJ</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Simulado Detran RJ</h1>
        <p id="progress">Carregando...</p>
      </header>

      <section id="mode-card" class="card" hidden>
        <h2>Escolha uma sessão de prática</h2>
        <div class="mode-actions">
          <button id="official-mode-btn" type="button">Simulado de 30 questões</button>
          <button id="all-mode-btn" type="button" class="secondary">Todas as questões</button>
          <button id="mistake-mode-btn" type="button" class="secondary">Revisão de erros</button>
        </div>
        <p id="mistake-mode-help" class="muted"></p>
        <button id="reset-progress-btn" type="button" class="link-button">Resetar progresso</button>
      </section>

      <section id="question-card" class="card" hidden>
        <div id="image-wrap" class="image-wrap" hidden>
          <img id="question-image" alt="Imagem da questão">
        </div>

        <h2 id="question-text"></h2>
        <div id="answers" class="answers"></div>
        <p id="question-performance" class="performance" hidden></p>

        <div class="actions">
          <button id="confirm-btn" type="button">Confirmar</button>
          <button id="next-btn" type="button" hidden>Próxima</button>
        </div>
      </section>

      <section id="result-card" class="card" hidden>
        <h2>Resultado da sessão de prática</h2>
        <p id="score"></p>
        <p id="percentage"></p>
        <p id="missed-count"></p>
        <div class="actions">
          <button id="restart-btn" type="button">Iniciar novo Simulado de 30 questões</button>
          <button id="post-session-review-btn" type="button" class="secondary" hidden>Revisar erros desta sessão</button>
        </div>
      </section>

      <section id="review-card" class="card" hidden>
        <h2>Revisão pós-sessão</h2>
        <div id="review-items" class="review-items"></div>
        <div class="actions">
          <button id="back-to-results-btn" type="button" class="secondary">Voltar ao resultado</button>
          <button id="review-new-session-btn" type="button">Iniciar novo Simulado de 30 questões</button>
        </div>
      </section>

      <p id="error" class="error" hidden></p>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
